name: Package desktop applications

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-package:
    name: macOS ${{ matrix.architecture }} disk image
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            architecture: arm64
          - runner: macos-15-intel
            architecture: x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packaging/requirements-build.txt
      - name: Verify runner architecture
        run: test "$(uname -m)" = "${{ matrix.architecture }}"
      - name: Install build environment
        run: python -m pip install -r packaging/requirements-build.txt
      - name: Run tests
        run: python -m pytest -q
      - name: Build application and disk image
        run: bash packaging/macos/build_macos.sh
      - name: Smoke-test frozen application
        run: >-
          ./dist/Napari\ Compare\ Xenium\ MERSCOPE.app/Contents/MacOS/NapariCompareXeniumMERSCOPE
          --package-smoke-test
      - uses: actions/upload-artifact@v6
        with:
          name: macos-${{ matrix.architecture }}-dmg
          path: artifacts/*-macOS-${{ matrix.architecture }}.dmg
          if-no-files-found: error

  windows-installer:
    name: Windows installer
    runs-on: windows-2025
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packaging/requirements-build.txt
      - name: Install build environment
        run: python -m pip install -r packaging/requirements-build.txt
      - name: Run tests
        run: python -m pytest -q
      - name: Ensure Inno Setup is available
        shell: pwsh
        run: |
          $compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $compiler)) { choco install innosetup --no-progress -y }
      - name: Build application and installer
        shell: pwsh
        run: ./packaging/windows/build_windows.ps1
      - name: Smoke-test frozen application
        shell: pwsh
        run: |
          $env:NAPARI_COMPARE_SMOKE_TEST_LOG = Join-Path $PWD "package-smoke-test.log"
          $process = Start-Process ".\dist\NapariCompareXeniumMERSCOPE\NapariCompareXeniumMERSCOPE.exe" -ArgumentList "--package-smoke-test" -PassThru
          if (-not $process.WaitForExit(120000)) {
            $process.Kill()
            $process.WaitForExit()
            if (Test-Path $env:NAPARI_COMPARE_SMOKE_TEST_LOG) { Get-Content $env:NAPARI_COMPARE_SMOKE_TEST_LOG }
            throw "Frozen application smoke test timed out"
          }
          if (Test-Path $env:NAPARI_COMPARE_SMOKE_TEST_LOG) { Get-Content $env:NAPARI_COMPARE_SMOKE_TEST_LOG }
          if ($process.ExitCode -ne 0) { throw "Frozen application exited with $($process.ExitCode)" }
      - uses: actions/upload-artifact@v6
        with:
          name: windows-installer
          path: artifacts/*-Setup.exe
          if-no-files-found: error

  linux-package:
    name: Linux package
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packaging/requirements-build.txt
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libfontconfig1 \
            libfreetype6 \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libice6 \
            libsm6 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-render0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxext6 \
            libxi6 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libxrender1
      - name: Install build environment
        run: python -m pip install -r packaging/requirements-build.txt
      - name: Run tests
        run: python -m pytest -q
      - name: Build application and package
        run: bash packaging/linux/build_linux.sh
      - name: Verify frozen Qt libraries
        run: |
          plugin="$(find ./dist/NapariCompareXeniumMERSCOPE -name libqxcb.so -print -quit)"
          if [[ -z "$plugin" ]]; then
            echo "The frozen application does not contain the Qt xcb platform plugin." >&2
            exit 1
          fi
          ldd "$plugin"
          if ldd "$plugin" | grep -q "not found"; then
            echo "The Qt xcb platform plugin has unresolved runtime libraries." >&2
            exit 1
          fi
      - name: Smoke-test frozen application
        run: timeout 120s xvfb-run -a ./dist/NapariCompareXeniumMERSCOPE/NapariCompareXeniumMERSCOPE --package-smoke-test
      - uses: actions/upload-artifact@v6
        with:
          name: linux-deb
          path: artifacts/*.deb
          if-no-files-found: error
